name: Deploy SOC App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Backend
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build